apiVersion: apps/v1
kind: Deployment 
metadata:
  name: cartservice
  namespace: microservices
  labels:
    app: cartservice
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cartservice
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template: 
    metadata: 
      labels:
        app: cartservice
        version: v1

    spec:
      serviceAccountName: default
      containers:
      - name: cartservice
        image: cartservice:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 7070
          name: grpc
          protocol: TCP
        env:
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: cartservice-config
              key: ASPNETCORE_URLS
        - name: REDIS_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: REDIS_ADDR
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: DISABLE_PROFILER
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: ENABLE_TRACING
        - name: OTEL_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: cartservice-config
              key: OTEL_SERVICE_NAME
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_EXPORTER_OTLP_PROTOCOL
        - name: OTEL_TRACES_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_TRACES_EXPORTER
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_LOGS_EXPORTER
        - name: OTEL_RESOURCE_ATTRIBUTES
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_RESOURCE_ATTRIBUTES
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          tcpSocket:
            port: 7070
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 7070
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: 
  name: cartservice-service
  namespace: microservices
  labels:
    app: cartservice
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
    - protocol: TCP
      port: 7070
      targetPort: 7070
      name: grpc 