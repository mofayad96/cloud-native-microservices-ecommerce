apiVersion: apps/v1
kind: Deployment 
metadata:
  name: recommendationservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendationservice
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template: 
    metadata: 
      labels:
        app: recommendationservice

    spec:
      serviceAccountName: recommendationservice
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: recommendationservice
      containers:
      - name: recommendationservice-pod
        image: recommendationservice
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        ports:
        - containerPort: 8080
        env:
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: PRODUCT_CATALOG_SERVICE_ADDR
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: recommendationservice-config
              key: PORT
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: DISABLE_PROFILER
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: ENABLE_TRACING
        - name: OTEL_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: recommendationservice-config
              key: OTEL_SERVICE_NAME
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_EXPORTER_OTLP_PROTOCOL
        - name: OTEL_TRACES_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_TRACES_EXPORTER
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_LOGS_EXPORTER
        - name: OTEL_RESOURCE_ATTRIBUTES
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_RESOURCE_ATTRIBUTES
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: 
  name: recommendationservice-service
spec:
  selector:
    app: recommendationservice
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8080 

