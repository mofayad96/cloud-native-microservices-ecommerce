apiVersion: apps/v1
kind: Deployment 
metadata:
  name: checkoutservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkoutservice
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template: 
    metadata: 
      labels:
        app: checkoutservice

    spec:
      serviceAccountName: default
      containers:
      - name: checkoutservice-pod
        image: checkoutservice
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          
        ports:
        - containerPort: 5050
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: checkoutservice-config
              key: PORT
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: PRODUCT_CATALOG_SERVICE_ADDR
        - name: SHIPPING_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: SHIPPING_SERVICE_ADDR
        - name: CURRENCY_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: CURRENCY_SERVICE_ADDR
        - name: PAYMENT_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: PAYMENT_SERVICE_ADDR
        - name: EMAIL_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: EMAIL_SERVICE_ADDR
        - name: CART_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: CART_SERVICE_ADDR
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: DISABLE_PROFILER
        - name: ENABLE_TRACING
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: ENABLE_TRACING
        - name: COLLECTOR_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: COLLECTOR_SERVICE_ADDR
        - name: OTEL_SERVICE_NAME
          valueFrom:
            configMapKeyRef:
              name: checkoutservice-config
              key: OTEL_SERVICE_NAME
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_EXPORTER_OTLP_PROTOCOL
        - name: OTEL_TRACES_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_TRACES_EXPORTER
        - name: OTEL_METRICS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_METRICS_EXPORTER
        - name: OTEL_LOGS_EXPORTER
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_LOGS_EXPORTER
        - name: OTEL_RESOURCE_ATTRIBUTES
          valueFrom:
            configMapKeyRef:
              name: microservices-config
              key: OTEL_RESOURCE_ATTRIBUTES
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5050
          initialDelaySeconds: 20
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata: 
  name: checkoutservice-service
spec:
  selector:
    app: checkoutservice
  ports:
    - protocol: TCP
      port: 5050
      targetPort: 5050 