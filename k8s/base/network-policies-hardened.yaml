# Default Deny All Ingress & Egress for microservices namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: microservices
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow Egress to DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: microservices
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Frontend: Ingress from LoadBalancer (any source) & Egress to Core Services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public ingress on port 8080
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # Egress to other microservices and OpenTelemetry Collector
    - to:
        - podSelector:
            matchLabels:
              app: adservice
      ports:
        - port: 9555
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: cartservice
      ports:
        - port: 7070
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: checkoutservice
      ports:
        - port: 5050
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: currencyservice
      ports:
        - port: 7000
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: productcatalog
      ports:
        - port: 3550
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: recommendationservice
      ports:
        - port: 8080
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: shippingservice
      ports:
        - port: 50051
          protocol: TCP
    # Egress to OTEL collector for tracing/metrics
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
---
# AdService: Ingress from Frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adservice-netpol
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: adservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 9555
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
---
# CartService: Ingress from Frontend & CheckoutService, Egress to Redis
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cartservice-netpol
  namespace: microservices
spec:
  podSelector:
    matchLabels:
      app: cartservice
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: checkoutservice
      ports:
        - port: 7070
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
---
# Redis: Ingress from CartService
apiVersion: networking.k8s.io/v1
