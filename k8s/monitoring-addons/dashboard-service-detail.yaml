apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-service-detail
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-detail.json: |
    {
      "__inputs": [],
      "__requires": [],
      "title": "Service Detail",
      "uid": "service-detail",
      "version": 2,
      "schemaVersion": 39,
      "timezone": "browser",
      "editable": true,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "query": "label_values(kube_deployment_status_replicas_available{namespace=\"microservices\"}, deployment)",
            "current": {
              "text": "frontend",
              "value": "frontend"
            },
            "refresh": 2,
            "sort": 1,
            "includeAll": false,
            "multi": false,
            "label": "Service"
          }
        ]
      },
      "panels": [
        {
          "type": "stat",
          "title": "Replicas",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"microservices\", deployment=\"$service\"}",
              "legendFormat": "Available"
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"microservices\", deployment=\"$service\"}",
              "legendFormat": "Desired"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Restarts (1h)",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 4,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"microservices\", pod=~\"$service-.*\"}[1h]))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "CPU",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 8,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"microservices\", container=\"$service\"}[5m]))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          }
        },
        {
          "type": "stat",
          "title": "Memory",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"microservices\", container=\"$service\"})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "CPU Usage",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 3
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"microservices\", container=\"$service\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Memory Usage",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 3
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"microservices\", container=\"$service\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Pod Status Over Time",
          "gridPos": {
            "h": 6,
            "w": 24,
            "x": 0,
            "y": 11
          },
          "targets": [
            {
              "expr": "kube_pod_status_phase{namespace=\"microservices\", pod=~\"$service-.*\"}",
              "legendFormat": "{{pod}} - {{phase}}"
            }
          ]
        }
      ]
    }
