apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-service-detail
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  service-detail.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [],
      "title": "Service Detail",
      "uid": "service-detail",
      "version": 1,
      "schemaVersion": 39,
      "timezone": "browser",
      "editable": true,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "query": "label_values(kube_deployment_labels{namespace=\"microservices\"}, deployment)",
            "current": {
              "text": "frontend",
              "value": "frontend"
            },
            "refresh": 1,
            "sort": 1,
            "includeAll": false,
            "multi": false,
            "label": "Service"
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Overview",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "type": "stat",
          "title": "Replicas",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"microservices\", deployment=\"$service\"}",
              "legendFormat": "Available"
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"microservices\", deployment=\"$service\"}",
              "legendFormat": "Desired"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Restarts (1h)",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"microservices\", pod=~\"$service-.*\"}[1h]))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "CPU",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"microservices\", container=\"$service\"}[5m]))"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          }
        },
        {
          "type": "stat",
          "title": "Memory",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"microservices\", container=\"$service\"})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "CPU Usage Over Time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"microservices\", container=\"$service\"}[5m])",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Memory Usage Over Time",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"microservices\", container=\"$service\"}",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Request Rate (OTel)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "sum(rate(microservices_http_server_request_count{service_name=\"$service\"}[5m]))",
              "legendFormat": "HTTP"
            },
            {
              "expr": "sum(rate(microservices_rpc_server_duration_count{service_name=\"$service\"}[5m]))",
              "legendFormat": "gRPC"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Latency P50 / P95 / P99 (OTel)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(microservices_http_server_duration_bucket{service_name=\"$service\"}[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(microservices_http_server_duration_bucket{service_name=\"$service\"}[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(microservices_http_server_duration_bucket{service_name=\"$service\"}[5m])) by (le))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        }
      ]
    }
