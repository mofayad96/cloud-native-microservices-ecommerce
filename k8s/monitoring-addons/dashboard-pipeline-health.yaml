apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-pipeline-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  otel-collector.json: |
    {
      "__inputs": [],
      "__requires": [],
      "title": "OTEL Collector",
      "uid": "otel-collector",
      "version": 2,
      "schemaVersion": 39,
      "timezone": "browser",
      "editable": true,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "tags": [
        "otel"
      ],
      "panels": [
        {
          "type": "stat",
          "title": "Collector Status",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "up{job=\"otel-collector\"}",
              "legendFormat": "Collector"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Traces Received (from Collector logs)",
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 0,
            "y": 3
          },
          "description": "Spans per 30s showing the collector is processing traces from microservices",
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"microservices\", container=\"otel-collector\"}[1m])",
              "legendFormat": "Collector CPU"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Collector Memory",
          "gridPos": {
            "h": 6,
            "w": 12,
            "x": 12,
            "y": 3
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"microservices\", container=\"otel-collector\"}",
              "legendFormat": "Memory"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        }
      ]
    }
