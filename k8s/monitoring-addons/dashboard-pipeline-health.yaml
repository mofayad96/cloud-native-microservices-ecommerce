apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-pipeline-health
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  otel-pipeline-health.json: |
    {
      "__inputs": [],
      "__requires": [],
      "title": "OTEL Pipeline Health",
      "uid": "otel-pipeline-health",
      "version": 1,
      "schemaVersion": 39,
      "timezone": "browser",
      "editable": true,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "tags": [
        "otel",
        "observability"
      ],
      "panels": [
        {
          "type": "row",
          "title": "Collector",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "type": "stat",
          "title": "Collector Up",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "up{job=~\".*otel.*\"}",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Metrics Exported (rate)",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(microservices_otelcol_exporter_sent_metrics_count{}[5m]))"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Spans Received (rate)",
          "gridPos": {
            "h": 3,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(rate(microservices_otelcol_receiver_accepted_spans_count{}[5m]))"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Exporter Send Latency",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 4
          },
          "targets": [
            {
              "expr": "rate(microservices_otelcol_exporter_send_duration_seconds_sum{}[5m]) / rate(microservices_otelcol_exporter_send_duration_seconds_count{}[5m])",
              "legendFormat": "{{exporter}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Receiver Accepted / Refused",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 4
          },
          "targets": [
            {
              "expr": "sum(rate(microservices_otelcol_receiver_accepted_spans_count{}[5m])) by (receiver)",
              "legendFormat": "accepted {{receiver}}"
            },
            {
              "expr": "sum(rate(microservices_otelcol_receiver_refused_spans_count{}[5m])) by (receiver)",
              "legendFormat": "refused {{receiver}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Processor Batch Size",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "targets": [
            {
              "expr": "microservices_otelcol_processor_batch_size_count{}",
              "legendFormat": "{{processor}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "gRPC Metrics Received Per Service",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "targets": [
            {
              "expr": "sum(rate(microservices_http_server_request_count{}[5m])) by (service_name)",
              "legendFormat": "{{service_name}}"
            }
          ]
        }
      ]
    }
