apiVersion: v1
kind: ConfigMap
metadata:
  name: dash-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  microservices-golden-signals.json: |
    {
      "__inputs": [],
      "__requires": [],
      "title": "Microservices Golden Signals",
      "uid": "microservices-golden-signals",
      "version": 1,
      "schemaVersion": 39,
      "timezone": "browser",
      "editable": true,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "tags": [
        "microservices",
        "ecommerce"
      ],
      "panels": [
        {
          "type": "row",
          "title": "Service Health",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "collapsed": false
        },
        {
          "type": "stat",
          "title": "Deployments Ready",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(kube_deployment_status_replicas_ready{namespace=\"microservices\"})",
              "legendFormat": "Ready"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 8
                  },
                  {
                    "color": "green",
                    "value": 13
                  }
                ]
              }
            }
          }
        },
        {
          "type": "stat",
          "title": "Pods Running",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"microservices\", phase=\"Running\"})",
              "legendFormat": "Running"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Pod Restarts (1h)",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"microservices\"}[1h]))",
              "legendFormat": "Restarts"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 3
                  },
                  {
                    "color": "red",
                    "value": 10
                  }
                ]
              }
            }
          }
        },
        {
          "type": "stat",
          "title": "Services Up",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "targets": [
            {
              "expr": "count(kube_deployment_status_replicas_available{namespace=\"microservices\"} > 0)",
              "legendFormat": "Available"
            }
          ]
        },
        {
          "type": "row",
          "title": "Resource Usage",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 5
          },
          "collapsed": false
        },
        {
          "type": "bargauge",
          "title": "CPU Usage per Service",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 6
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"microservices\", container!=\"\"}[5m])) by (container)",
              "legendFormat": "{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores",
              "color": {
                "mode": "continuous-GrYlRd"
              },
              "min": 0
            }
          }
        },
        {
          "type": "bargauge",
          "title": "Memory Usage per Service",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 6
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"microservices\", container!=\"\"}) by (container)",
              "legendFormat": "{{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {
                "mode": "continuous-GrYlRd"
              },
              "min": 0
            }
          }
        },
        {
          "type": "row",
          "title": "Application Metrics (OpenTelemetry)",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "collapsed": false
        },
        {
          "type": "timeseries",
          "title": "Request Rate (OTel)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 15
          },
          "targets": [
            {
              "expr": "sum(rate(microservices_http_server_request_count{}[5m])) by (service_name)",
              "legendFormat": "{{service_name}}",
              "hide": false
            },
            {
              "expr": "sum(rate(microservices_rpc_server_duration_count{}[5m])) by (service_name)",
              "legendFormat": "{{service_name}} (gRPC)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "palette-classic"
              }
            }
          }
        },
        {
          "type": "timeseries",
          "title": "P95 Latency (OTel)",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 15
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(microservices_http_server_duration_bucket{}[5m])) by (le, service_name))",
              "legendFormat": "{{service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {
                "mode": "palette-classic"
              }
            }
          }
        }
      ]
    }
