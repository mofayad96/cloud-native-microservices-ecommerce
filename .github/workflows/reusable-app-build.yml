name: reusable app build

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Hadolint Dockerfile Linting
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.service_path }}/Dockerfile
          failure-threshold: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # AWS Credentials configuration
      - name: AWS Configure
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Build and push with Buildx and GHA caching
      - name: Build and Push Docker Image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.service_path }}/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service_name }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: false

      # Trivy Security Vulnerability Scanning
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ inputs.service_name }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
          output: 'trivy-report-${{ inputs.service_name }}.txt'

      - name: Upload Trivy Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ inputs.service_name }}
          path: trivy-report-${{ inputs.service_name }}.txt

      # SBOM Generation with Syft
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: '${{ steps.login-ecr.outputs.registry }}/${{ inputs.service_name }}:${{ github.sha }}'
          format: 'spdx-json'
          output-file: 'sbom-${{ inputs.service_name }}.spdx.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.service_name }}
          path: sbom-${{ inputs.service_name }}.spdx.json

      # Slack Notification
      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *Build ${{ job.status }}: ${{ inputs.service_name }}*\n*Repo:* ${{ github.repository }} | *Branch:* ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Build Logs>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
